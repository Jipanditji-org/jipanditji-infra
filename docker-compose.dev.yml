name: jipanditji-dev

services:
  mysql:
    image: mysql:8.4
    container_name: jipanditji-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jipanditji_dev
      MYSQL_USER: jipanditji
      MYSQL_PASSWORD: jipanditji_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jipanditji-dev

  redis:
    image: redis:7-alpine
    container_name: jipanditji-redis-dev
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_dev_data:/data
    networks:
      - jipanditji-dev

  backend:
    build:
      context: ../pw-backend
    container_name: jipanditji-backend-dev
    restart: unless-stopped
    env_file:
      - ./env/backend.dev.env
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_uploads_dev:/app/uploads
      - backend_temp_dev:/app/temp
    networks:
      - jipanditji-dev

  coreweb:
    build:
      context: ../jp-coreweb
    container_name: jipanditji-coreweb-dev
    restart: unless-stopped
    env_file:
      - ./env/frontend.dev.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - jipanditji-dev

  toolbox:
    build:
      context: ../toolbox-web
    container_name: jipanditji-toolbox-dev
    restart: unless-stopped
    command: ["npm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "3000"]
    env_file:
      - ./env/toolbox.dev.env
    ports:
      - "5173:3000"
    depends_on:
      - backend
    networks:
      - jipanditji-dev

  nginx:
    image: nginx:1.27-alpine
    container_name: jipanditji-nginx-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - coreweb
      - toolbox
      - backend
    networks:
      - jipanditji-dev

volumes:
  mysql_dev_data:
  redis_dev_data:
  backend_uploads_dev:
  backend_temp_dev:

networks:
  jipanditji-dev:
    driver: bridge
