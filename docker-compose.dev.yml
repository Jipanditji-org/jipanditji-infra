name: jipanditji-dev #running command :  `docker compose -f jipanditji-infra/docker-compose.dev.yml up -d --build`

services:
  redis:
    image: redis:7-alpine
    container_name: jipanditji-redis-dev
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jipanditji-dev

  backend:
    build:
      context: ../pw-backend
      dockerfile: Dockerfile
      target: development
    container_name: jipanditji-backend-dev
    restart: unless-stopped
    command: ["npm", "run", "dev"]
    env_file:
      - ../pw-backend/.env.dev
    environment:
      NODE_ENV: development
      PORT: 5001
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://dev.jipanditji.com
      BACKEND_URL: https://dev.backend.jipanditji.com
      CDN_UPLOAD_URL: https://cdn.backend.jipanditji.com/protected
      CDN_PUBLIC_URL: https://cdn.backend.jipanditji.com
      CRON_ENABLED: "false"
    ports:
      - "${BACKEND_HOST_PORT:-5001}:5001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../pw-backend:/app
      - backend_node_modules_dev:/app/node_modules
      - backend_uploads_dev:/app/uploads
      - backend_temp_dev:/app/temp
    networks:
      - jipanditji-dev

  coreweb:
    build:
      context: ../jp-coreweb
      dockerfile: Dockerfile
      target: development
    container_name: jipanditji-coreweb-dev
    restart: unless-stopped
    command: ["npm", "run", "dev"]
    env_file:
      - ./env/frontend.dev.env
    ports:
      - "${COREWEB_HOST_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ../jp-coreweb:/app
      - coreweb_node_modules_dev:/app/node_modules
      - coreweb_next_dev:/app/.next
    networks:
      - jipanditji-dev

  toolbox:
    build:
      context: ../toolbox-web
      dockerfile: Dockerfile
      target: development
    container_name: jipanditji-toolbox-dev
    restart: unless-stopped
    command: ["npm", "run", "start", "--", "--host", "0.0.0.0"]
    env_file:
      - ./env/toolbox.dev.env
    ports:
      - "${TOOLBOX_HOST_PORT:-5174}:5173"
    depends_on:
      - backend
    volumes:
      - ../toolbox-web:/app
      - toolbox_node_modules_dev:/app/node_modules
    networks:
      - jipanditji-dev

  nginx:
    image: nginx:1.27-alpine
    container_name: jipanditji-nginx-dev
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - coreweb
      - toolbox
      - backend
    networks:
      - jipanditji-dev

volumes:
  redis_dev_data:
  backend_node_modules_dev:
  backend_uploads_dev:
  backend_temp_dev:
  coreweb_node_modules_dev:
  coreweb_next_dev:
  toolbox_node_modules_dev:

networks:
  jipanditji-dev:
    driver: bridge
