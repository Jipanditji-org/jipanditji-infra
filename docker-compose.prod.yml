name: jipanditji-prod #running command :  `docker compose -f jipanditji-infra/docker-compose.prod.yml up -d --build`

services:
  redis:
    image: redis:7-alpine
    container_name: jipanditji-redis-prod
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jipanditji-prod

  backend:
    build:
      context: ../pw-backend
      dockerfile: Dockerfile
      target: production
    container_name: jipanditji-backend-prod
    restart: unless-stopped
    env_file:
      - ../pw-backend/.env.prod
    ports:
      - "${BACKEND_HOST_PORT:-5003}:5001"
    volumes:
      - backend_uploads_prod:/app/uploads
      - backend_temp_prod:/app/temp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jipanditji-prod

  coreweb:
    build:
      context: ../jp-coreweb
      dockerfile: Dockerfile
      target: production
      args:
        APP_ENV: prod
        NEXT_PUBLIC_BACKEND_HOSTED_URL: https://backend.jipanditji.com
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-226059950968-fcelide192sipt7k8eem2idvlsbqft88.apps.googleusercontent.com}
    container_name: jipanditji-coreweb-prod
    restart: unless-stopped
    env_file:
      - ../jp-coreweb/.env.prod
    environment:
      NODE_ENV: production
    ports:
      - "${COREWEB_HOST_PORT:-3002}:3000"
    depends_on:
      - backend
    networks:
      - jipanditji-prod

  toolbox:
    build:
      context: ../toolbox-web
      dockerfile: Dockerfile
      target: production
      args:
        APP_ENV: prod
        VITE_BACKEND_HOSTED_URL: https://backend.jipanditji.com
    container_name: jipanditji-toolbox-prod
    restart: unless-stopped
    env_file:
      - ../toolbox-web/.env.prod
    environment:
      NODE_ENV: production
    ports:
      - "${TOOLBOX_HOST_PORT:-5176}:80"
    depends_on:
      - backend
    networks:
      - jipanditji-prod

  nginx:
    image: nginx:1.27-alpine
    container_name: jipanditji-nginx-prod
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-8082}:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - coreweb
      - toolbox
      - backend
    networks:
      - jipanditji-prod

volumes:
  redis_prod_data:
  backend_uploads_prod:
  backend_temp_prod:

networks:
  jipanditji-prod:
    driver: bridge
