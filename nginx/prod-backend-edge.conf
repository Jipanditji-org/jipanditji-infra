map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

client_max_body_size 50M;

upstream backend_prod_host {
    server host.docker.internal:5003;
}

server {
    listen 80;
    server_name backend.jipanditji.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name backend.jipanditji.com;

    ssl_certificate /etc/letsencrypt/live/backend.jipanditji.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.jipanditji.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /api/v1/platform/upload-webdav {
        client_max_body_size 100M;
        proxy_request_buffering off;
        proxy_pass http://backend_prod_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://backend_prod_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
