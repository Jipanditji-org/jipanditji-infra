map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

upstream backend_dev_host {
    server host.docker.internal:5001;
}

upstream backend_testing_host {
    server host.docker.internal:5002;
}

upstream backend_prod_host {
    server host.docker.internal:5003;
}

upstream coreweb_dev_host {
    server host.docker.internal:3000;
}

upstream coreweb_testing_host {
    server host.docker.internal:3001;
}

upstream coreweb_prod_host {
    server host.docker.internal:3002;
}

upstream toolbox_dev_host {
    server host.docker.internal:5174;
}

upstream toolbox_testing_host {
    server host.docker.internal:5175;
}

upstream toolbox_prod_host {
    server host.docker.internal:5176;
}

server {
    listen 80;
    server_name dev.backend.jipanditji.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.backend.jipanditji.com;

    ssl_certificate /etc/letsencrypt/live/dev.backend.jipanditji.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.backend.jipanditji.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://backend_dev_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

