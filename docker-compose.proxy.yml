name: jipanditji-proxy

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: jipanditji-nginx-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/all-regions.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ${CDN_UPLOADS_PATH:-/var/www/jipanditji/uploads}:/var/www/jipanditji/uploads:z
      - ${CDN_HTPASSWD_PATH:-/etc/nginx/.htpasswd}:/etc/nginx/.htpasswd:ro
